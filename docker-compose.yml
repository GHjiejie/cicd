networks:
  cicd_net:
    name: my_gitea_net
    external: false

services:
  server:
    image: gitea/gitea:latest 
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=db:3306
      - GITEA__database__NAME=${DB_NAME}
      - GITEA__database__USER=${DB_USER}
      - GITEA__database__PASSWD=${DB_PASSWORD} # 👈 引用变量
      - GITEA__actions__ENABLED=true
    restart: always
    networks:
      - cicd_net
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    depends_on:
      - db

  db:
    image: mysql:latest 
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD} # 👈 引用变量
      - MYSQL_USER=${DB_USER}                   # 👈 引用变量
      - MYSQL_PASSWORD=${DB_PASSWORD}           # 👈 引用变量
      - MYSQL_DATABASE=${DB_NAME}
    networks:
      - cicd_net
    volumes:
      - ./mysql:/var/lib/mysql

  runner:
    image: gitea/act_runner:latest
    container_name: gitea_runner
    environment:
      - GITEA_INSTANCE_URL=http://gitea:3000  
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN} # 👈 引用变量
      - GITEA_RUNNER_NAME=local-docker-runner
      - CONFIG_FILE=/config.yaml
    volumes:
      - ./runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock 
      - ./runner-config.yaml:/config.yaml
    networks:
      - cicd_net
    restart: always

  registry:
    image: registry:3.0.0
    container_name: docker_registry
    restart: always
    ports:
      - "5050:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "['*']"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: "['HEAD', 'GET', 'OPTIONS', 'DELETE']"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: "['Authorization', 'Accept', 'Cache-Control']"
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: "['Docker-Content-Digest']"
    volumes:
      - ./registry-data:/var/lib/registry 
    networks:
      - cicd_net
    
  registry-ui:
    image: joxit/docker-registry-ui:main
    container_name: registry_ui
    restart: always
    ports:
      - "9000:80"  
    environment:
      - REGISTRY_TITLE=My Gitea Registry 
      - REGISTRY_URL=http://localhost:5050 
      - DELETE_IMAGES=true 
    depends_on:
      - registry
    networks:
      - cicd_net