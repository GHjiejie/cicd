networks:
  cicd_net:
    name: my_gitea_net
    external: false

services:
  server:
    image: gitea/gitea:latest 
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=db:3306
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
      - GITEA__actions__ENABLED=true  # 👈 关键：开启 Actions 功能
    restart: always
    networks:
      - cicd_net
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    depends_on:
      - db

  db:
    image: mysql:latest 
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=gitea
      - MYSQL_USER=gitea
      - MYSQL_PASSWORD=gitea
      - MYSQL_DATABASE=gitea
    networks:
      - cicd_net
    volumes:
      - ./mysql:/var/lib/mysql
  

  runner:
    image: gitea/act_runner:latest
    container_name: gitea_runner
    environment:
      - GITEA_INSTANCE_URL=http://gitea:3000  
      - GITEA_RUNNER_REGISTRATION_TOKEN=Yw1f49Ihc2uziIpg4nboatgitOZmb5YptxvFAs7L  
      - GITEA_RUNNER_NAME=local-docker-runner
      - CONFIG_FILE=/config.yaml
    volumes:
      - ./runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock # 关键：让 Runner 能调用宿主机 Docker
      - ./runner-config.yaml:/config.yaml
    networks:
      - cicd_net
    restart: always


  registry:
    image: registry:3.0.0
    container_name: docker_registry
    restart: always
    ports:
      - "5050:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "['*']"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: "['HEAD', 'GET', 'OPTIONS', 'DELETE']"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: "['Authorization', 'Accept', 'Cache-Control']"
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: "['Docker-Content-Digest']"
    volumes:
      - ./registry-data:/var/lib/registry 
    networks:
      - cicd_net
    
  registry-ui:
    image: joxit/docker-registry-ui:main
    container_name: registry_ui
    restart: always
    ports:
      - "9000:80"  
    environment:
      - REGISTRY_TITLE=My Gitea Registry 
      - REGISTRY_URL=http://localhost:5050  #镜像仓库的地址，需要注意，不要去内网里面去找
      - DELETE_IMAGES=true 
    depends_on:
      - registry
    networks:
      - cicd_net

  